  <!-- style是css部分网页，网页样式 -->

</head>

<!-- hmtl网页主体 -->

<body>
  <div class="container">

    <div class="config">
      服务器地址:
      <input id="baseUrl" value="http://192.168.12.138:8080">
      <button id="btnRefresh" style="width:auto;padding:4px 10px;">刷新状态</button>
    </div>

    <div class="card">
      <h2>灯 (device 1)</h2>
      <div class="status-row">
        <span>
          <span id="dotOnline" class="dot"></span>
          在线状态:
          <span id="txtOnline">未知</span>
        </span>
      </div>

      <div class="status-row">
        <span>
          <span id="dotOn" class="dot"></span>
          开关状态:
          <span id="txtState">未知</span>
        </span>
      </div>

      <div class="btns">
        <button id="btnOn" class="btn-on">开灯</button>
        <button id="btnOff" class="btn-off">关灯</button>
      </div>
    </div>

    <div class="log" id="log"></div>
  </div>

  <!-- 脚本部分 -->
  <script>
    // 当前控制的设备id是1
    const DEVICE_ID = 1;

    // 定义函数baseUrl，调用会返回服务器的地址
    function baseUrl() {
      // 通过id来寻找元素，得到字符串，如果服务器地址最后一个字符是"/"的话，去掉
      return document.getElementById('baseUrl').value.replace(/\/$/, '');
    }

    // 定义日志输出函数
    function log(msg) {
      // 通过id寻找元素，保存到el中
      const el = document.getElementById('log');
      // 创建一个元素，理解为动态生成html
      const line = document.createElement('div');
      // 获取时间
      const time = new Date().toLocaleTimeString();
      // 设置line元素里的文本内容
      line.textContent = `[${time}] ${msg}`;
      // 将新创建的line元素追加到日志窗口中
      el.appendChild(line);
      // 设置滚动条移动到最下边，就像聊天可以看到最新消息
      el.scrollTop = el.scrollHeight;
    }

    // 定义异步函数，获取设备状态，用于更新界面
    async function refreshStatus() {
      try {
        // 等价于curl http://xxx/api/device/1
        const res = await fetch(`${baseUrl()}/api/device/${DEVICE_ID}`);
        if (!res.ok) {
          log(`获取状态失败: HTTP ${res.status}`);
          return;
        }
        // ws转发的mqtt数据，得到json数据data
        const data = await res.json();
        log(`GET /api/device/${DEVICE_ID} -> ${JSON.stringify(data)}`);

        // 将data转为js对象，才能访问，进行比较得到bool结果
        const online = data.online === 1;
        // 修改该元素文字
        document.getElementById('txtOnline').textContent = online ? '在线' : '离线';
        // 修改class，为真class是dot online，为假是dot，在html中的空格在css中使用点来代替
        document.getElementById('dotOnline').className = 'dot' + (online ? ' online' : '');

        let lightOn = null;
        try {
          // state是json字符串，转为javaScript对象，这样stateObj.light就可以直接访问了
          const stateObj = JSON.parse(data.state);
          // 判断json里有没有light字段
          if (typeof stateObj.light !== 'undefined') {
            lightOn = stateObj.light === 1;
          }
        } catch (e) {
          // state 不是合法 json 或还没有上报过,忽略
        }

        if (lightOn === null) {
          document.getElementById('txtState').textContent = '未知';
          document.getElementById('dotOn').className = 'dot';
        } else {
          document.getElementById('txtState').textContent = lightOn ? '开' : '关';
          document.getElementById('dotOn').className = 'dot' + (lightOn ? ' on' : '');
        }
      }
      // try执行失败后会到这里
      catch (e) {
        log(`请求异常: ${e.message}`);
      }
    }

    // 定义异步函数，发送开关指令
    async function sendCmd(on) {
      const body = JSON.stringify({ light: on ? 1 : 0 });
      try {
        const res = await fetch(`${baseUrl()}/api/device/${DEVICE_ID}/cmd`, {
          method: 'POST',
          body: body
        });
        const text = await res.text();
        log(`POST /api/device/${DEVICE_ID}/cmd ${body} -> ${res.status} ${text}`);
        // 命令是异步下发给设备的,这里延迟一点再刷新状态
        setTimeout(refreshStatus, 500);
      } catch (e) {
        log(`发送指令异常: ${e.message}`);
      }
    }

    // 绑定按钮
    document.getElementById('btnOn').onclick = () => sendCmd(true);
    document.getElementById('btnOff').onclick = () => sendCmd(false);
    document.getElementById('btnRefresh').onclick = refreshStatus;

    // WebSocket: 观察服务端推送(目前只有设备 info 更新会推送,state 更新暂时不会)

    function connectWs() {
      const wsUrl = baseUrl().replace(/^http/, 'ws') + '/ws';
      //建立长连接
      const ws = new WebSocket(wsUrl);

      // 连接成功执行打印
      ws.onopen = () => log(`WS 已连接: ${wsUrl}`);
      // ws建立成功收到的消息
      ws.onmessage = (event) => {
        log(`WS 收到推送: ${event.data}`);
        // 刷新
        refreshStatus();
      };
      ws.onclose = () => log('WS 已断开');
      ws.onerror = () => log('WS 连接出错');
    }

    // 网页加载完成会执行下边的动作
    window.onload = () => {
      refreshStatus();
      connectWs();
    };
  </script>
</body>

</html>
