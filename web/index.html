<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>设备控制 - 灯</title>
<style>
  body {
    font-family: -apple-system, "Microsoft YaHei", sans-serif;
    background: #f2f2f2;
    margin: 0;
    padding: 24px;
  }
  .container {
    max-width: 420px;
    margin: 0 auto;
  }
  .config {
    margin-bottom: 16px;
    font-size: 13px;
    color: #555;
  }
  .config input {
    width: 220px;
    padding: 4px 6px;
  }
  .card {
    background: #fff;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .card h2 {
    margin: 0 0 12px 0;
    font-size: 18px;
  }
  .status-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #333;
    margin-bottom: 4px;
  }
  .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    background: #aaa;
  }
  .dot.online { background: #2ecc71; }
  .dot.on { background: #f1c40f; }
  .btns {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  button {
    flex: 1;
    padding: 12px 0;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .btn-on {
    background: #2ecc71;
    color: #fff;
  }
  .btn-off {
    background: #e74c3c;
    color: #fff;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .log {
    margin-top: 20px;
    background: #111;
    color: #0f0;
    font-family: monospace;
    font-size: 12px;
    height: 160px;
    overflow-y: auto;
    padding: 8px;
    border-radius: 6px;
  }
  .log div { margin-bottom: 2px; white-space: pre-wrap; }
</style>
</head>
<body>
<div class="container">

  <div class="config">
    服务器地址:
    <input id="baseUrl" value="http://192.168.12.138:8080">
    <button id="btnRefresh" style="width:auto;padding:4px 10px;">刷新状态</button>
  </div>

  <div class="card">
    <h2>灯 (device 1)</h2>
    <div class="status-row">
      <span><span id="dotOnline" class="dot"></span>在线状态: <span id="txtOnline">未知</span></span>
    </div>
    <div class="status-row">
      <span><span id="dotOn" class="dot"></span>开关状态: <span id="txtState">未知</span></span>
    </div>
    <div class="btns">
      <button id="btnOn" class="btn-on">开灯</button>
      <button id="btnOff" class="btn-off">关灯</button>
    </div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
const DEVICE_ID = 1;

function baseUrl() {
  return document.getElementById('baseUrl').value.replace(/\/$/, '');
}

function log(msg) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  const time = new Date().toLocaleTimeString();
  line.textContent = `[${time}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

// 拉取当前设备状态,更新界面
async function refreshStatus() {
  try {
    const res = await fetch(`${baseUrl()}/api/device/${DEVICE_ID}`);
    if (!res.ok) {
      log(`获取状态失败: HTTP ${res.status}`);
      return;
    }
    const data = await res.json();
    log(`GET /api/device/${DEVICE_ID} -> ${JSON.stringify(data)}`);

    const online = data.online === 1;
    document.getElementById('txtOnline').textContent = online ? '在线' : '离线';
    document.getElementById('dotOnline').className = 'dot' + (online ? ' online' : '');

    // state 字段是设备上报的原始 json 字符串,尝试解析出 light 字段
    let lightOn = null;
    try {
      const stateObj = JSON.parse(data.state);
      if (typeof stateObj.light !== 'undefined') {
        lightOn = stateObj.light === 1;
      }
    } catch (e) {
      // state 不是合法 json 或还没有上报过,忽略
    }

    if (lightOn === null) {
      document.getElementById('txtState').textContent = '未知';
      document.getElementById('dotOn').className = 'dot';
    } else {
      document.getElementById('txtState').textContent = lightOn ? '开' : '关';
      document.getElementById('dotOn').className = 'dot' + (lightOn ? ' on' : '');
    }
  } catch (e) {
    log(`请求异常: ${e.message}`);
  }
}

// 发送开关指令
async function sendCmd(on) {
  const body = JSON.stringify({ light: on ? 1 : 0 });
  try {
    const res = await fetch(`${baseUrl()}/api/device/${DEVICE_ID}/cmd`, {
      method: 'POST',
      body: body
    });
    const text = await res.text();
    log(`POST /api/device/${DEVICE_ID}/cmd ${body} -> ${res.status} ${text}`);
    // 命令是异步下发给设备的,这里延迟一点再刷新状态
    setTimeout(refreshStatus, 500);
  } catch (e) {
    log(`发送指令异常: ${e.message}`);
  }
}

document.getElementById('btnOn').onclick = () => sendCmd(true);
document.getElementById('btnOff').onclick = () => sendCmd(false);
document.getElementById('btnRefresh').onclick = refreshStatus;

// WebSocket: 观察服务端推送(目前只有设备 info 更新会推送,state 更新暂时不会)
function connectWs() {
  const wsUrl = baseUrl().replace(/^http/, 'ws') + '/ws';
  const ws = new WebSocket(wsUrl);

  ws.onopen = () => log(`WS 已连接: ${wsUrl}`);
  ws.onmessage = (event) => {
    log(`WS 收到推送: ${event.data}`);
    refreshStatus();
  };
  ws.onclose = () => log('WS 已断开');
  ws.onerror = () => log('WS 连接出错');
}

window.onload = () => {
  refreshStatus();
  connectWs();
};
</script>
</body>
</html>
